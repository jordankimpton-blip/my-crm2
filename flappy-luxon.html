<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flappy Luxon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }
    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      touch-action: none;
    }
    #loading {
      position: absolute;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
      text-align: center;
    }
    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 12px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  Loading politicians...
</div>
<canvas id="gameCanvas"></canvas>

<script>
// ============================================================
//  FLAPPY LUXON — NZ Political Satire
//  Tap to fly, avoid red tape, stay out of the coalition zone
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const loading = document.getElementById('loading');

// ── Game dimensions (logical pixels) ─────────────────────────
const GW = 390;
const GH = 700;

function resize() {
  const r = Math.min(window.innerWidth / GW, window.innerHeight / GH);
  canvas.style.width  = Math.floor(GW * r) + 'px';
  canvas.style.height = Math.floor(GH * r) + 'px';
  canvas.width  = GW;
  canvas.height = GH;
}
resize();
window.addEventListener('resize', resize);

const PIPE_EVERY  = 95;   // frames between pipes

const LEADER_EVERY_MAX = 450;

let gameMode = 'luxon'; // current mode — set at character select

const imgs = {};   // key → HTMLImageElement or null

// ── Fetch Wikipedia thumbnail, load image ─────────────────────
async function loadPoliticianImage(key) {
  const pol = POLS[key];
  try {
    let src = null;

    if (pol.wikiFile) {
      // Fetch direct URL from Commons API — avoids redirect CORS issues
      const res  = await fetch(
        `https://commons.wikimedia.org/w/api.php?action=query&titles=File:${encodeURIComponent(pol.wikiFile)}&prop=imageinfo&iiprop=url&format=json&origin=*`
      );
      const data = await res.json();
      const pages = data.query?.pages ?? {};
      src = Object.values(pages)[0]?.imageinfo?.[0]?.url ?? null;
    }

    if (!src) {
      const res  = await fetch(
        `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(pol.wiki)}`
      );
      const data = await res.json();
      src = data.thumbnail?.source ?? null;
    }

    if (!src) { imgs[key] = null; return; }

    await new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => { imgs[key] = img; resolve(); };
      img.onerror = () => { imgs[key] = null;  resolve(); };
      img.src = src;
    });
  } catch (_) {
    imgs[key] = null;
  }
}

// ── Draw circular face (or coloured fallback) ─────────────────
function drawFace(key, cx, cy, r, rotation = 0) {
  const pol = POLS[key];
  const img = imgs[key];

  ctx.save();
  ctx.translate(cx, cy);
  if (rotation) ctx.rotate(rotation);

  // Clip to circle
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.closePath();

  if (img) {
    ctx.clip();
    // Crop: horizontal centre, upper portion
    const iw = img.naturalWidth;
    const ih = img.naturalHeight;
    const srcY  = ih * pol.faceTop;
    const srcH  = ih * pol.faceH;
    const srcX  = 0;
    const srcW  = iw;
    // Scale so the cropped strip fills the circle diameter
    const scale = (r * 2) / Math.min(srcW, srcH);
    const dw = srcW * scale;
    const dh = srcH * scale;
    ctx.drawImage(img, srcX, srcY, srcW, srcH, -dw / 2, -r, dw, dh);
  } else {
    // Fallback: solid colour + initial
    ctx.fillStyle = pol.color;
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = `bold ${Math.round(r * 0.9)}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pol.name[0], 0, 1);
  }

  ctx.restore();

  // White ring border
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2.5;
  ctx.stroke();
}

// ── Audio ─────────────────────────────────────────────────────
let audioCtx;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur, type = 'sine', vol = 0.12) {
  try {
    const a = ac(), o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.start(); o.stop(a.currentTime + dur);
  } catch (_) {}
}
function playScore() { beep(880, 0.08, 'sine', 0.1); }
function playJump()  { beep(520, 0.06, 'square', 0.07); }
function playDeath() {
  [280, 240, 200, 160].forEach((f, i) =>
    setTimeout(() => beep(f, 0.12, 'sawtooth', 0.15), i * 80)
  );
}
function playCelebration() {
  [523, 659, 784, 1047].forEach((f, i) =>
    setTimeout(() => beep(f, 0.15, 'sine', 0.12), i * 80)
  );
}
function playPetersWarning() { beep(200, 0.25, 'sawtooth', 0.1); }

// ── Game state ────────────────────────────────────────────────
let state     = 'select';  // 'select' | 'start' | 'playing' | 'dead'
let score     = 0;  // days leading
let highScore = 0;
let frame     = 0;

// Poll percentage derived from player Y each frame
let pollPct = 38;

function getPollPct() {
  const playableH = GH - GROUND_H - PLAYER_R * 2;
  const frac = 1 - Math.max(0, Math.min(1, (player.y - PLAYER_R) / playableH));
  return Math.round(frac * 55 + 5); // 5% (bottom) → 60% (top)
}

let player = { x: PLAYER_X, y: GH / 2, vy: 0, rotation: 0 };
let pipes  = [];
let leaders = [];
let taxFlashes = [];
let particles  = [];
let clouds = [
  { x: 60,  y: 70,  w: 90,  spd: 0.25 },
  { x: 240, y: 130, w: 65,  spd: 0.18 },
  { x: 330, y: 55,  w: 50,  spd: 0.32 },
];

let nextPipe   = 100;
let nextLeader = 300;
let nextPeters = 480;

// Winston Peters obstacles (erratic movement)
let petersObstacles = [];

// Milestone celebration flashes
let milestoneFlashes = [];
let majorityShown    = false;  // reset per game
let prevPollPct      = 38;

// ── Reset ─────────────────────────────────────────────────────
function reset() {
  player   = { x: PLAYER_X, y: GH / 2, vy: 0, rotation: 0 };
  pipes    = [];
  leaders  = [];
  petersObstacles = [];
  taxFlashes = [];
  milestoneFlashes = [];
  particles  = [];
  frame    = 0;
  score    = 0;
  nextPipe   = 100;
  nextLeader = 300;
  nextPeters = 480;
  majorityShown = false;
  prevPollPct   = 38;
}

// ── Input ─────────────────────────────────────────────────────
function tap() {
  if (state === 'start') {
    state = 'playing';
    player.vy = JUMP_VEL;
    playJump();
    return;
  }
  if (state === 'dead') {
    reset();
    state = 'start';
    return;
  }
  // Playing
  player.vy = JUMP_VEL;
  playJump();

  // Mode-specific flash text
  const M = MODES[gameMode];
  const variants = M.tapTexts;
  taxFlashes.push({
    text:  variants[Math.floor(Math.random() * variants.length)],
    x:     GW / 2,
    y:     GH * 0.28 + (Math.random() * 80 - 40),
    alpha: 1,
    scale: 0.4,
    vy:    -0.6,
  });

  // Burst particles in mode colours
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI * 2 * i) / 6;
    particles.push({
      x: player.x, y: player.y,
      vx: Math.cos(angle) * (1.5 + Math.random()),
      vy: Math.sin(angle) * (1.5 + Math.random()),
      life: 1, color: M.particleColors[i % 3],
    });
  }
}

function tapAt(clientX, clientY) {
  if (state === 'select') {
    // Determine which half was tapped
    const rect  = canvas.getBoundingClientRect();
    const ratio = canvas.width / rect.width;
    const gx    = (clientX - rect.left) * ratio;
    gameMode = gx < GW / 2 ? 'luxon' : 'hipkins';
    reset();
    state = 'start';
    return;
  }
  if (state === 'dead') {
    // Bottom zone → go back to character select
    const rect  = canvas.getBoundingClientRect();
    const gy    = (clientY - rect.top) * (canvas.height / rect.height);
    if (gy > GH / 2 + 160) { state = 'select'; return; }
    reset();
    state = 'start';
    return;
  }
  tap();
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); tapAt(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('mousedown',  e => { e.preventDefault(); tapAt(e.clientX, e.clientY); });
document.addEventListener('keydown',  e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    if (state === 'select') { gameMode = 'luxon'; reset(); state = 'start'; } else tap();
  }
  if (e.code === 'ArrowRight' || e.code === 'KeyH') {
    if (state === 'select') { gameMode = 'hipkins'; reset(); state = 'start'; }
  }
});

// ── Collision helpers ─────────────────────────────────────────
function circRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(cx, rx + rw));
  const nearY = Math.max(ry, Math.min(cy, ry + rh));
  return Math.hypot(cx - nearX, cy - nearY) < cr;
}

// ── Update ────────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;
  frame++;

  // Update poll percentage
  prevPollPct = pollPct;
  pollPct = getPollPct();

  // Score = days leading (increment every ~2 seconds of survival)
  if (frame % 120 === 0) score++;

  // ── Difficulty ramp (speed increases with days survived) ──
  const dynamicSpeed = Math.min(4.2, 2.1 + score * 0.06);

  // ── Milestone: Majority ──
  const M = MODES[gameMode];
  if (pollPct >= 50 && prevPollPct < 50 && !majorityShown) {
    majorityShown = true;
    milestoneFlashes.push({ text: M.majorityText, x: GW/2, y: GH*0.38, alpha:1, scale:0.3, vy:-0.3 });
    playCelebration();
  }
  if (pollPct >= 57 && prevPollPct < 57) {
    milestoneFlashes.push({ text: M.landslide, x: GW/2, y: GH*0.32, alpha:1, scale:0.3, vy:-0.3 });
    playCelebration();
  }

  // Update milestone flashes
  for (let i = milestoneFlashes.length - 1; i >= 0; i--) {
    const m = milestoneFlashes[i];
    m.alpha -= 0.008;
    m.scale  = Math.min(1.5, m.scale + 0.05);
    m.y     += m.vy;
    if (m.alpha <= 0) milestoneFlashes.splice(i, 1);
  }

  // ── Player ──
  player.vy += GRAVITY;
  player.y  += player.vy;
  player.rotation = Math.max(-0.45, Math.min(0.9, player.vy * 0.075));

  // Ceiling bounce
  if (player.y - PLAYER_R < 0) { player.y = PLAYER_R; player.vy = 1; }

  // Ground = death
  if (player.y + PLAYER_R >= GH - GROUND_H) { die(); return; }

  // ── Pipes ──
  if (frame >= nextPipe) {
    const side   = Math.random() < 0.5 ? 'top' : 'bottom';
    const minH   = 120;
    const maxH   = 320;
    const h      = minH + Math.random() * (maxH - minH);
    const labels = MODES[gameMode].pipeLabels;
    const label  = labels[Math.floor(Math.random() * labels.length)];
    pipes.push({ x: GW + PIPE_W, side, h, scored: false, label });
    nextPipe = frame + PIPE_EVERY;
  }

  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= dynamicSpeed;

    if (!p.scored && p.x + PIPE_W < player.x) {
      p.scored = true;
      playScore();
    }

    // Collision: single-sided pipe
    if (p.side === 'top') {
      if (circRect(player.x, player.y, PLAYER_R - 3,
                   p.x, 0, PIPE_W, p.h)) { die(); return; }
    } else {
      if (circRect(player.x, player.y, PLAYER_R - 3,
                   p.x, GH - GROUND_H - p.h, PIPE_W, p.h)) { die(); return; }
    }

    if (p.x + PIPE_W < 0) pipes.splice(i, 1);
  }

  // ── Opposition leaders ──
  if (frame >= nextLeader) {
    const types = MODES[gameMode].leaders;
    const type  = types[Math.floor(Math.random() * types.length)];
    const y     = 90 + Math.random() * (GH - GROUND_H - 220);
    leaders.push({
      type, x: GW + 50, y,
      spd:    2.2 + Math.random() * 1.4,
      wobble: Math.random() * Math.PI * 2,
    });
    nextLeader = frame + LEADER_EVERY_MIN +
                 Math.floor(Math.random() * (LEADER_EVERY_MAX - LEADER_EVERY_MIN));
  }

  for (let i = leaders.length - 1; i >= 0; i--) {
    const l = leaders[i];
    l.x      -= l.spd;
    l.wobble += 0.045;
    l.y      += Math.sin(l.wobble) * 0.9;

    if (Math.hypot(player.x - l.x, player.y - l.y) < PLAYER_R + 28) {
      die(); return;
    }
    if (l.x + 50 < 0) leaders.splice(i, 1);
  }

  // ── Winston Peters (erratic wildcard) ──
  if (frame >= nextPeters) {
    petersObstacles.push({
      x:       GW + 60,
      y:       130 + Math.random() * (GH - GROUND_H - 280),
      vy:      (Math.random() - 0.5) * 5,
      spd:     3.0 + Math.random() * 0.8,
      nextJolt: frame + 18 + Math.floor(Math.random() * 22),
    });
    playPetersWarning();
    nextPeters = frame + 520 + Math.floor(Math.random() * 280);
  }

  for (let i = petersObstacles.length - 1; i >= 0; i--) {
    const p = petersObstacles[i];
    p.x -= p.spd + (dynamicSpeed - 2.1) * 0.5; // also speeds up with difficulty
    p.y += p.vy;

    // Random direction jolts — that's just Winston
    if (frame >= p.nextJolt) {
      p.vy = (Math.random() - 0.5) * 7;
      p.nextJolt = frame + 12 + Math.floor(Math.random() * 20);
    }

    // Bounce off ceiling / ground
    if (p.y < 40)                   { p.y = 40;                   p.vy =  Math.abs(p.vy); }
    if (p.y > GH - GROUND_H - 50)  { p.y = GH - GROUND_H - 50;  p.vy = -Math.abs(p.vy); }

    if (Math.hypot(player.x - p.x, player.y - p.y) < PLAYER_R + 30) {
      die(); return;
    }
    if (p.x + 60 < 0) petersObstacles.splice(i, 1);
  }

  // ── Tax cut flashes ──
  for (let i = taxFlashes.length - 1; i >= 0; i--) {
    const t = taxFlashes[i];
    t.alpha -= 0.022;
    t.scale  = Math.min(1.4, t.scale + 0.075);
    t.y     += t.vy;
    if (t.alpha <= 0) taxFlashes.splice(i, 1);
  }

  // ── Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.12;
    p.life -= 0.045;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // ── Clouds ──
  for (const c of clouds) {
    c.x -= c.spd;
    if (c.x + c.w < 0) c.x = GW + c.w;
  }
}

function die() {
  state = 'dead';
  if (score > highScore) highScore = score;
  playDeath();
}

// ── Draw helpers ──────────────────────────────────────────────
function rRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ── Draw ──────────────────────────────────────────────────────
function draw() {
  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, GH);
  sky.addColorStop(0, '#5BBCE8');
  sky.addColorStop(1, '#A8DEFF');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, GW, GH);

  drawClouds();
  if (state !== 'start') drawPollAxis();
  drawPipes();
  drawLeaders();
  drawPeters();
  drawGround();

  drawParticles();
  drawPlayer();

  drawTaxFlashes();
  drawMilestoneFlashes();

  if (state === 'playing' || state === 'dead') drawHUD();
  if (state === 'playing' || state === 'dead') drawPollGauge();
  if (state === 'select') drawSelect();

  if (state === 'dead')   drawGameOver();
}

// ── Clouds ────────────────────────────────────────────────────
function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.72)';
  for (const c of clouds) {
    const cx = c.x, cy = c.y, w = c.w, h = w * 0.45;
    rRect(cx, cy, w, h, h / 2); ctx.fill();
    rRect(cx + w * 0.1, cy - h * 0.4, w * 0.75, h * 0.9, h * 0.45); ctx.fill();
    rRect(cx + w * 0.35, cy - h * 0.6, w * 0.5, h * 0.9, h * 0.45); ctx.fill();

}

// ── Pipes (bureaucratic red tape) ─────────────────────────────
function drawPipes() {
  for (const p of pipes) {
    if (p.side === 'top') {
      drawBureauPipe(p.x, 0, PIPE_W, p.h, 'top', p.label);
    } else {
      drawBureauPipe(p.x, GH - GROUND_H - p.h, PIPE_W, p.h, 'bot', p.label);
    }
  }
}

function drawBureauPipe(x, y, w, h, end, label) {
  if (h <= 0) return;

  // Body
  const bodyGrad = ctx.createLinearGradient(x, 0, x + w, 0);
  bodyGrad.addColorStop(0,   '#2c2c2c');
  bodyGrad.addColorStop(0.4, '#454545');
  bodyGrad.addColorStop(1,   '#1a1a1a');
  ctx.fillStyle = bodyGrad;
  ctx.fillRect(x, y, w, h);

  // Red tape diagonal stripes
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.strokeStyle = 'rgba(200, 0, 0, 0.55)';
  ctx.lineWidth = 7;
  for (let s = -h; s < w + h; s += 18) {
    ctx.beginPath();
    ctx.moveTo(x + s, y);
    ctx.lineTo(x + s + h, y + h);
    ctx.stroke();
  }
  ctx.restore();

  // Cap
  const capH = 22;
  const capGrad = ctx.createLinearGradient(x - 6, 0, x + w + 6, 0);
  capGrad.addColorStop(0,   '#383838');
  capGrad.addColorStop(0.5, '#5a5a5a');
  capGrad.addColorStop(1,   '#303030');
  ctx.fillStyle = capGrad;
  if (end === 'top') {
    ctx.fillRect(x - 6, y + h - capH, w + 12, capH);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(x - 6, y + h - capH, w + 12, 3);
  } else {
    ctx.fillRect(x - 6, y, w + 12, capH);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(x - 6, y + capH - 3, w + 12, 3);
  }

  // Scandal label (rotated, centred)
  if (h > 55 && label) {
    ctx.save();
    ctx.translate(x + w / 2, y + h / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = 'rgba(255, 80, 80, 0.9)';
    ctx.font = 'bold 8px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 0, 0);
    ctx.restore();
  }
}

// ── Ground (opposition zone — mode aware) ─────────────────────

  const R    = M.groundRight;

  ctx.fillRect(half, gy, half, GROUND_H);

  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(half, gy); ctx.lineTo(half, GH);
  ctx.stroke();
  ctx.setLineDash([]);

  // Left text
  ctx.textAlign = 'center';
  ctx.fillStyle = L.tc;
  ctx.font = 'bold 17px Arial';
  ctx.fillText(L.title, half / 2, gy + 25);
  ctx.font = '10px Arial';
  ctx.fillStyle = L.tc === '#FFD700' ? '#aaa' : '#333';
  ctx.fillText(L.sub1, half / 2, gy + 41);
  ctx.font = '9px Arial';
  ctx.fillStyle = L.tc === '#FFD700' ? '#888' : '#555';
  ctx.fillText(L.sub2, half / 2, gy + 57);
  ctx.font = '8px Arial';
  ctx.fillStyle = L.tc === '#FFD700' ? '#666' : '#777';
  ctx.fillText(L.sub3, half / 2, gy + 71);

  // Right text
  ctx.fillStyle = R.tc;
  ctx.font = 'bold 17px Arial';
  ctx.fillText(R.title, half + half / 2, gy + 25);
  ctx.font = '10px Arial';
  ctx.fillStyle = R.tc === '#FFD700' ? '#aaa' : '#333';
  ctx.fillText(R.sub1, half + half / 2, gy + 41);
  ctx.font = '9px Arial';
  ctx.fillStyle = R.tc === '#FFD700' ? '#888' : '#555';
  ctx.fillText(R.sub2, half + half / 2, gy + 57);
  ctx.font = '8px Arial';
  ctx.fillStyle = R.tc === '#FFD700' ? '#666' : '#777';
  ctx.fillText(R.sub3, half + half / 2, gy + 71);
}

// ── Player ────────────────────────────────────────────────────
function drawPlayer() {
  // On start screen, bob gently in place
  const displayY = state === 'start'
    ? GH / 2 + Math.sin(Date.now() / 600) * 10
    : player.y;
  const displayRotation = state === 'start' ? 0 : player.rotation;

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.beginPath();
  ctx.ellipse(player.x, GH - GROUND_H - 4, PLAYER_R * 0.8, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();

  // ── Horizontal tracker line (connects Luxon to the poll axis) ──
  if (state === 'playing') {
    const AXIS_X = 36;
    const pctColour = pollPct >= 40 ? '#00DD55' : pollPct >= 28 ? '#FFD700' : '#FF4444';
    ctx.save();
    ctx.strokeStyle = pctColour;
    ctx.globalAlpha = 0.6;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(AXIS_X, displayY);
    ctx.lineTo(player.x - PLAYER_R - 4, displayY);
    ctx.stroke();
    ctx.setLineDash([]);
    // Dot on the axis where the line meets
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(AXIS_X, displayY, 4, 0, Math.PI * 2);
    ctx.fillStyle = pctColour;
    ctx.fill();
    ctx.restore();

    // ── Floating % badge to the right of head ──────────────────
    ctx.save();
    const badgeText = pollPct + '%';
    const badgeX = player.x + PLAYER_R + 6;
    const badgeW = ctx.measureText(badgeText).width + 14;
    // Background pill
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    rRect(badgeX, displayY - 12, badgeW, 24, 7);
    ctx.fill();
    ctx.strokeStyle = pctColour;
    ctx.lineWidth = 1.5;
    rRect(badgeX, displayY - 12, badgeW, 24, 7);
    ctx.stroke();
    // Text
    ctx.fillStyle = pctColour;
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(badgeText, badgeX + badgeW / 2, displayY);
    ctx.restore();
  }

  drawFace(MODES[gameMode].player, player.x, displayY, PLAYER_R, displayRotation);

  // PM badge
  ctx.save();
  ctx.translate(player.x + PLAYER_R - 7, displayY - PLAYER_R + 7);
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0, Math.PI * 2);
  ctx.fillStyle = MODES[gameMode].accentColor;
  ctx.fill();
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 7px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PM', 0, 0.5);
  ctx.restore();
}

// ── Poll axis — left Y-axis + background zones + gridlines ────
function drawPollAxis() {
  const playableH = GH - GROUND_H;
  const AXIS_X    = 36; // left axis x position

  // Key Y positions
  const yAt = pct => playableH * (1 - (pct - 5) / 55);
  const dangerY   = yAt(28);
  const majorityY = yAt(40);

  ctx.save();

  // ── Background colour zones ──────────────────────────────────
  // Red danger band (below 28%)
  ctx.fillStyle = 'rgba(200, 0, 0, 0.10)';
  ctx.fillRect(AXIS_X, dangerY, GW - AXIS_X, playableH - dangerY);

  // Yellow safe band (28–40%)
  ctx.fillStyle = 'rgba(255, 210, 0, 0.07)';
  ctx.fillRect(AXIS_X, majorityY, GW - AXIS_X, dangerY - majorityY);

  // Green majority band (above 40%)
  ctx.fillStyle = 'rgba(0, 200, 80, 0.09)';
  ctx.fillRect(AXIS_X, 0, GW - AXIS_X, majorityY);

  // ── Left axis bar ────────────────────────────────────────────
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(AXIS_X, 0);
  ctx.lineTo(AXIS_X, playableH);
  ctx.stroke();

  // ── Gridlines + tick marks + labels ─────────────────────────
  for (let pct = 10; pct <= 60; pct += 10) {
    const ly = yAt(pct);
    const isKey = pct === 30 || pct === 40 || pct === 50;
    const colour = pct >= 40 ? '#66FF99' : pct >= 28 ? '#FFE566' : '#FF9999';

    // Gridline
    ctx.strokeStyle = isKey ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.09)';
    ctx.lineWidth = isKey ? 1.5 : 1;
    ctx.setLineDash(isKey ? [6, 5] : [3, 7]);
    ctx.beginPath();
    ctx.moveTo(AXIS_X, ly);
    ctx.lineTo(GW, ly);
    ctx.stroke();
    ctx.setLineDash([]);

    // Tick
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(AXIS_X - 6, ly);
    ctx.lineTo(AXIS_X, ly);
    ctx.stroke();

    // Label
    ctx.fillStyle = colour;
    ctx.font = isKey ? 'bold 9px Arial' : '8px Arial';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(pct + '%', AXIS_X - 8, ly);
  }

  // ── Zone boundary labels ─────────────────────────────────────
  // "MAJORITY" threshold
  ctx.fillStyle = 'rgba(80,255,140,0.85)';
  ctx.font = 'bold 7px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('▶ MAJORITY', AXIS_X + 4, majorityY - 6);

  // "COALITION RISK" threshold
  ctx.fillStyle = 'rgba(255,100,80,0.85)';
  ctx.fillText('▶ COALITION RISK', AXIS_X + 4, dangerY + 7);

  // ── Axis title (rotated) ─────────────────────────────────────
  ctx.save();
  ctx.translate(9, playableH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = 'bold 8px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(MODES[gameMode].party.toUpperCase() + ' POLL %', 0, 0);
  ctx.restore();

  ctx.restore();
}

// ── Poll display (top bar — day + term) ───────────────────────

  ctx.font = 'bold 11px Arial';
  ctx.fillText('TERM ' + termNum, GW - 9, 22);
  ctx.fillStyle = termColour;
  ctx.fillText('TERM ' + termNum, GW - 10, 21);

  ctx.restore();
}

  ctx.strokeStyle = borderCol;
  ctx.lineWidth = 2;
  rRect(GW / 2 - 158, GH / 2 - 220, 316, 420, 22);
  ctx.stroke();
  ctx.restore();

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = borderCol;
  ctx.font = 'bold 52px Arial';
  ctx.fillText('FLAPPY', GW / 2, GH / 2 - 148);
  ctx.fillStyle = 'white';
  ctx.font = `bold ${lastName.length > 5 ? 40 : 48}px Arial`;
  ctx.fillText(lastName, GW / 2, GH / 2 - 100);

  // Face
  drawFace(M.player, GW / 2, GH / 2 - 28, 48);

  // Tagline
  ctx.fillStyle = borderCol;
  ctx.font = 'bold 13px Arial';
  ctx.fillText('Stay high in the polls!', GW / 2, GH / 2 + 44);

  ctx.fillStyle = 'rgba(255,255,255,0.78)';
  ctx.font = '11.5px Arial';
  ctx.fillText(M.startSub1, GW / 2, GH / 2 + 63);
  ctx.fillText(M.startSub2, GW / 2, GH / 2 + 80);

  // Blinking tap prompt
  const pulse = 0.65 + 0.35 * Math.sin(Date.now() / 380);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = 'white';
  ctx.font = 'bold 20px Arial';
  ctx.fillText('TAP TO START', GW / 2, GH / 2 + 128);
  ctx.globalAlpha = 1;

  if (highScore > 0) {
    ctx.fillStyle = borderCol;
    ctx.font = '13px Arial';
    ctx.fillText(`🏆 Best: ${highScore}`, GW / 2, GH / 2 + 160);
  }
}

// ── Game over ─────────────────────────────────────────────────
function drawGameOver() {
  const M      = MODES[gameMode];
  const panelC1 = gameMode === 'luxon' ? '#A80000' : '#003080';
  const panelC2 = gameMode === 'luxon' ? '#CC0000' : '#004BB0';

  // Dim
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, GW, GH);

  // Panel
  ctx.save();
  const panelGrad = ctx.createLinearGradient(GW / 2 - 158, 0, GW / 2 + 158, 0);
  panelGrad.addColorStop(0,   panelC1);
  panelGrad.addColorStop(0.5, panelC2);
  panelGrad.addColorStop(1,   panelC1);
  ctx.fillStyle = panelGrad;
  rRect(GW / 2 - 158, GH / 2 - 228, 316, 460, 22);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  rRect(GW / 2 - 158, GH / 2 - 228, 316, 460, 22);
  ctx.stroke();
  ctx.restore();

  // Headline
  ctx.textAlign = 'center';
  ctx.fillStyle = 'white';
  ctx.font = 'bold 26px Arial';
  ctx.fillText(M.gameOver1, GW / 2, GH / 2 - 177);
  ctx.font = 'bold 24px Arial';
  ctx.fillText(M.gameOver2, GW / 2, GH / 2 - 148);

  // Subhead
  ctx.fillStyle = '#FFD700';
  ctx.font = 'italic 15px Georgia';
  ctx.fillText(M.gameOverSub, GW / 2, GH / 2 - 120);

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(GW / 2 - 120, GH / 2 - 104);
  ctx.lineTo(GW / 2 + 120, GH / 2 - 104);
  ctx.stroke();

  // Score box
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  rRect(GW / 2 - 108, GH / 2 - 96, 216, 80, 12);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '13px Arial';
  ctx.fillText('DAYS LEADING IN THE POLLS', GW / 2, GH / 2 - 73);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 46px Arial';
  ctx.fillText(score, GW / 2, GH / 2 - 36);

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '12px Arial';
  ctx.fillText('Final poll: ' + pollPct + '%', GW / 2, GH / 2 - 14);

  // High score line
  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 13px Arial';
    ctx.fillText('🏆 NEW RECORD!', GW / 2, GH / 2 + 10);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '12px Arial';
    ctx.fillText(`Best: ${highScore}`, GW / 2, GH / 2 + 10);
  }

  // Quote
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  ctx.font = 'italic 11.5px Georgia';
  ctx.fillText(M.quote1, GW / 2, GH / 2 + 50);
  ctx.fillText(M.quote2, GW / 2, GH / 2 + 65);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '10px Georgia';
  ctx.fillText('— NZ Herald, probably', GW / 2, GH / 2 + 82);

  // Tap to retry
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 380);
  ctx.globalAlpha = pulse;
  ctx.fillStyle = 'white';
  ctx.font = 'bold 19px Arial';
  ctx.fillText('TAP TO TRY AGAIN', GW / 2, GH / 2 + 128);
  ctx.globalAlpha = 1;

  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.font = '10px Arial';
  ctx.fillText('(NZ politics is a marathon, not a sprint)', GW / 2, GH / 2 + 150);

  // Change character hint (tap very bottom of panel)
  ctx.fillStyle = 'rgba(255,255,255,0.42)';
  ctx.font = '10px Arial';
  ctx.fillText('↩  tap below here to change character', GW / 2, GH / 2 + 178);
  // Separator line above hint
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(GW / 2 - 100, GH / 2 + 164);
  ctx.lineTo(GW / 2 + 100, GH / 2 + 164);
  ctx.stroke();
}

// ── Game loop ─────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ── Boot ──────────────────────────────────────────────────────
(async () => {
  await Promise.all(Object.keys(POLS).map(loadPoliticianImage));
  loading.style.display = 'none';
  loop();
})();
</script>
